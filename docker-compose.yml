services:
  site:
    image: ${GHCR_IMAGE:-ghcr.io/qudy2001/suttonbuilder:latest}
    pull_policy: always
    command: ["site"]
    restart: unless-stopped
    ports:
      - "${SITE_PORT:-4173}:8080"
    volumes:
      - ./assets/data:/app/assets/data
      - ./assets/uploads:/app/assets/uploads

  admin:
    image: ${GHCR_IMAGE:-ghcr.io/qudy2001/suttonbuilder:latest}
    pull_policy: always
    command: ["admin"]
    restart: unless-stopped
    depends_on:
      - site
    ports:
      - "${ADMIN_PORT:-4174}:8080"
    volumes:
      - ./assets/data:/app/assets/data
      - ./assets/uploads:/app/assets/uploads
